<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>context-mode benchmarks</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --muted: #6e7681;
    --text: #e6edf3;
    --red: #f85149;
    --red-dim: rgba(248, 81, 73, 0.18);
    --green: #3fb950;
    --green-dim: rgba(63, 185, 80, 0.22);
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 720px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Inter, sans-serif; font-feature-settings: "tnum" 1, "cv11" 1; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; padding: 48px 72px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; }
  h1 .accent { color: var(--accent); }
  .sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
  .legend { display: flex; gap: 24px; font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
  .legend .dot.raw { background: var(--red); }
  .legend .dot.ctx { background: var(--green); }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th { text-align: left; font-weight: 500; color: var(--muted); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; padding: 0 0 12px; border-bottom: 1px solid #21262d; }
  th.num { text-align: right; }
  th.bar { width: 40%; }
  td { padding: 14px 0; border-bottom: 1px solid #1c2128; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.scenario { color: var(--text); padding-right: 16px; }
  td.bar { padding: 0 24px; }
  .barwrap { position: relative; height: 28px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
  .bar { height: 10px; border-radius: 3px; transform-origin: left center; transform: scaleX(0); animation-fill-mode: forwards; animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1); }
  .bar.raw { background: var(--red); box-shadow: 0 0 0 1px var(--red-dim); }
  .bar.ctx { background: var(--green); box-shadow: 0 0 0 1px var(--green-dim); }
  td.raw { color: var(--red); }
  td.ctx { color: var(--green); }
  td.saved { color: var(--green); font-weight: 500; }
  .footer { margin-top: auto; padding-top: 28px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
  .footer .total { font-size: 15px; color: var(--text); }
  .footer .total .from { color: var(--red); }
  .footer .total .to { color: var(--green); }
  .footer .total .arrow { color: var(--muted); margin: 0 8px; }

  /* Row reveal — each row fades in + bars grow, staggered */
  tr.row { opacity: 0; animation: rowIn 0.45s ease-out forwards; }
  @keyframes rowIn { to { opacity: 1; } }
  @keyframes growBar { to { transform: scaleX(var(--scale, 1)); } }

  /* Row stagger: 8 rows, 0.6s apart, each takes 1.1s to fill the bar */
  tr.row:nth-child(1) { animation-delay: 0.2s; }
  tr.row:nth-child(2) { animation-delay: 0.8s; }
  tr.row:nth-child(3) { animation-delay: 1.4s; }
  tr.row:nth-child(4) { animation-delay: 2.0s; }
  tr.row:nth-child(5) { animation-delay: 2.6s; }
  tr.row:nth-child(6) { animation-delay: 3.2s; }
  tr.row:nth-child(7) { animation-delay: 3.8s; }
  tr.row:nth-child(8) { animation-delay: 4.4s; }
  tr.row:nth-child(1) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s forwards; }
  tr.row:nth-child(2) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 0.9s forwards; }
  tr.row:nth-child(3) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 1.5s forwards; }
  tr.row:nth-child(4) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 2.1s forwards; }
  tr.row:nth-child(5) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 2.7s forwards; }
  tr.row:nth-child(6) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 3.3s forwards; }
  tr.row:nth-child(7) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 3.9s forwards; }
  tr.row:nth-child(8) .bar { animation: growBar 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) 4.5s forwards; }

  .footer { opacity: 0; animation: rowIn 0.6s ease-out 6.0s forwards; }
</style>
</head>
<body>
  <h1>context-mode <span class="accent">Benchmarks</span></h1>
  <div class="sub">Raw MCP tool output vs. what actually enters the context window.</div>
  <div class="legend">
    <span><span class="dot raw"></span>Raw output</span>
    <span><span class="dot ctx"></span>Into context</span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Scenario</th>
        <th class="bar">Relative size</th>
        <th class="num">Raw</th>
        <th class="num">Context</th>
        <th class="num">Saved</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="footer">
    <div>8 real runs · live byte counts from the context-mode test suite</div>
    <div class="total">Session total <span class="from">315 KB</span><span class="arrow">→</span><span class="to">5.4 KB</span></div>
  </div>

<script>
  const ROWS = [
    { name: "Playwright snapshot",          raw: 56.2, ctx: 0.3,  saved: "99%"  },
    { name: "GitHub Issues (20)",           raw: 58.9, ctx: 1.1,  saved: "98%"  },
    { name: "Access log (500 requests)",    raw: 45.1, ctx: 0.2,  saved: "100%" },
    { name: "Context7 React docs",          raw:  5.9, ctx: 0.3,  saved: "96%"  },
    { name: "Analytics CSV (500 rows)",     raw: 85.5, ctx: 0.2,  saved: "100%" },
    { name: "Git log (153 commits)",        raw: 11.6, ctx: 0.1,  saved: "99%"  },
    { name: "Test output (30 suites)",      raw:  6.0, ctx: 0.3,  saved: "95%"  },
    { name: "Repo research (subagent)",     raw: 986,  ctx: 62,   saved: "94%"  },
  ];
  const maxRaw = Math.max(...ROWS.map(r => r.raw));
  const fmt = (kb) => kb >= 100 ? `${kb.toFixed(0)} KB` : `${kb.toFixed(1)} KB`;
  const tbody = document.getElementById("rows");
  for (const r of ROWS) {
    const tr = document.createElement("tr");
    tr.className = "row";
    tr.innerHTML = `
      <td class="scenario">${r.name}</td>
      <td class="bar">
        <div class="barwrap">
          <div class="bar raw" style="--scale: ${r.raw / maxRaw}"></div>
          <div class="bar ctx" style="--scale: ${Math.max(r.ctx / maxRaw, 0.004)}"></div>
        </div>
      </td>
      <td class="num raw">${fmt(r.raw)}</td>
      <td class="num ctx">${fmt(r.ctx)}</td>
      <td class="num saved">${r.saved}</td>
    `;
    tbody.appendChild(tr);
  }
</script>
</body>
</html>
